<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Biosensor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="container">
  <div class="card login-page">
    <h2 id="titulo">Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()" id="mainButton">Entrar</button>

    <div class="link" onclick="toggleMode()" id="toggleText">
      Não tem conta? Criar conta
    </div>

    <p id="erro"></p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "COLOCA_AQUI",
    authDomain: "COLOCA_AQUI",
    databaseURL: "COLOCA_AQUI",
    projectId: "COLOCA_AQUI"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  let isLogin = true;

  window.toggleMode = function() {
    isLogin = !isLogin;

    document.getElementById("titulo").innerText = isLogin ? "Login" : "Criar Conta";
    document.getElementById("mainButton").innerText = isLogin ? "Entrar" : "Registar";
    document.getElementById("toggleText").innerText =
      isLogin ? "Não tem conta? Criar conta" : "Já tem conta? Fazer login";

    document.getElementById("erro").innerText = "";
  }

  window.login = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (isLogin) {
      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          window.location.href = "index.html";
        })
        .catch(error => {
          document.getElementById("erro").innerText = error.message;
        });
    } else {
      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          window.location.href = "index.html";
        })
        .catch(error => {
          document.getElementById("erro").innerText = error.message;
        });
    }
  }
</script>

</body>
</html>
