<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Biosensor</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <div class="card">
    <h1 id="deviceName">Dispositivo</h1>
    <p class="status">Estado: <span id="estado">--</span></p>
    <p>Última medição:</p>
    <div class="valor" id="valor">--</div>
  </div>

  <div class="card">
    <div class="chart-container">
      <canvas id="grafico"></canvas>
    </div>
  </div>

  <div class="card">
    <button onclick="exportCSV()">Exportar CSV</button>
  </div>

  <div class="card">
    <button onclick="startMeasurement()">▶ Iniciar Medição</button>
    <button onclick="stopMeasurement()">⏹ Parar Medição</button>
    <button onclick="logout()">🔓 Logout</button>

    <!-- BLE BUTTON -->
    <button id="bleBtn">🔵 Ligar ao Sensor (Bluetooth)</button>
  </div>

</div>

<!-- ================= FIREBASE AUTH ================= -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB34LNKG3wHKhr6knHKLOiJdbNIjH6aQLI",
    authDomain: "biosensor-platform.firebaseapp.com",
    databaseURL: "https://biosensor-platform-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "biosensor-platform",
    storageBucket: "biosensor-platform.firebasestorage.app",
    messagingSenderId: "603962738518",
    appId: "1:603962738518:web:182bb93979a211d66938f7"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
    }
  });
</script>

<!-- ================= DASHBOARD + BLE ================= -->
<script>
const params = new URLSearchParams(window.location.search);
const deviceId = params.get("id");

document.getElementById("deviceName").innerText = deviceId || "Dispositivo";

const ctx = document.getElementById('grafico').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Concentração (mg/L)',
      data: [],
      borderWidth: 2,
      fill: false
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false
  }
});

let readings = [];

/* ================= FIREBASE FETCH ================= */
async function buscarDados() {
  // Se a medição estiver parada, não vamos buscar lixo ao Firebase
  if (!isMeasuring) return; 

  const response = await fetch(
    `https://biosensor-platform-default-rtdb.europe-west1.firebasedatabase.app/devices/${deviceId}.json`
  );

  const data = await response.json();

  if (!data || !data.concentration) return;

  document.getElementById("valor").innerText = data.concentration + " mg/L";

  if (data.concentration > 10) {
    document.getElementById("estado").innerText = "🔴 ALERTA";
    document.getElementById("estado").className = "alerta";
  } else {
    document.getElementById("estado").innerText = "🟢 NORMAL";
    document.getElementById("estado").className = "normal";
  }

  chart.data.labels.push(new Date().toLocaleTimeString());
  chart.data.datasets[0].data.push(data.concentration);
  chart.update();

  readings.push({
    timestamp: Date.now(),
    concentration: data.concentration
  });
}

setInterval(buscarDados, 5000);

/* ================= CSV EXPORT ================= */
function exportCSV() {
  let csv = "timestamp,concentration\n";

  readings.forEach(r => {
    csv += `${r.timestamp},${r.concentration}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "dados_biosensor.csv";
  a.click();
}

/* ================= LOGOUT ================= */
function logout() {
  window.location.href = "login.html";
}

/* ================= FIREBASE COMMANDS ================= */
/* ================= COMANDOS VIA BLE (SEM WIFI) ================= */

let isMeasuring = false; // Estado inicial

async function startMeasurement() {
  if (bleCharacteristic) {
    const encoder = new TextEncoder();
    await bleCharacteristic.writeValue(encoder.encode("1"));
    isMeasuring = true; // Ativa a atualização do gráfico
    document.getElementById("estado").innerText = "🔴 MEDINDO";
    document.getElementById("estado").className = "alerta";
  }
}

async function stopMeasurement() {
  if (bleCharacteristic) {
    const encoder = new TextEncoder();
    await bleCharacteristic.writeValue(encoder.encode("0"));
    isMeasuring = false; // Pausa a atualização do gráfico
    document.getElementById("estado").innerText = "⏹ PARADO";
    document.getElementById("estado").className = "normal";
  }
}



/* ================= BLE ================= */
let bleCharacteristic;
const SERVICE_UUID = '12345678-1234-1234-1234-1234567890ab';
const CHARACTERISTIC_UUID = 'abcd1234-5678-1234-5678-1234567890ab';

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("bleBtn").addEventListener("click", async () => {
    try {
      // 1. Mudamos o filtro para aceitar o nome ou o serviço
      const device = await navigator.bluetooth.requestDevice({
        filters: [
          { name: "BiosensorNano" },
          { services: [SERVICE_UUID] }
        ]
      });

      console.log("Conectando ao servidor GATT...");
      const server = await device.gatt.connect();

      console.log("Obtendo serviço...");
      const service = await server.getPrimaryService(SERVICE_UUID);

      console.log("Obtendo característica...");
      bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

      // 2. Iniciar notificações
      await bleCharacteristic.startNotifications();
      bleCharacteristic.addEventListener('characteristicvaluechanged', handleBLEData);

      document.getElementById("estado").innerText = "🔵 CONECTADO (BLE)";
      document.getElementById("estado").className = "normal";
      alert("Ligado ao biossensor via Bluetooth!");

    } catch (error) {
      console.error("Erro Bluetooth:", error);
      alert("Erro BLE: " + error.message);
    }
  });
});

/* ================= BLE DATA HANDLING ================= */
function handleBLEData(event) {
  if (!isMeasuring) return; // Se estiver parado, ignora os dados!

  const value = new TextDecoder().decode(event.target.value);
  const concentracao = parseFloat(value);
  if (isNaN(concentracao)) return;

  document.getElementById("valor").innerText = concentracao.toFixed(2) + " mg/L";

  // Atualiza o gráfico apenas se isMeasuring for true
  chart.data.labels.push(new Date().toLocaleTimeString());
  chart.data.datasets[0].data.push(concentracao);
  if (chart.data.labels.length > 20) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }
  chart.update();
}
</script>

</body>
</html>
