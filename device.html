<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard Biosensor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <h1 id="deviceName">Dispositivo</h1>

  <h2>Estado: <span id="estado">--</span></h2>
  <h3>Concentração atual: <span id="valor">--</span></h3>

  <canvas id="grafico" width="400" height="200"></canvas>

  <script>

    const params = new URLSearchParams(window.location.search);
    const deviceId = params.get("id");

    document.getElementById("deviceName").innerText = deviceId;

    const ctx = document.getElementById('grafico').getContext('2d');

    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'Concentração',
          data: []
        }]
      }
    });

    async function buscarDados() {

      const response = await fetch(
        `https://biosensor-platform-default-rtdb.europe-west1.firebasedatabase.app/devices/${deviceId}.json`
      );

      const data = await response.json();

      document.getElementById("valor").innerText = data.concentration;

      // Estado automático
      if (data.concentration > 10) {
        document.getElementById("estado").innerText = "🔴 ALERTA";
      } else {
        document.getElementById("estado").innerText = "🟢 NORMAL";
      }

      chart.data.labels.push(new Date().toLocaleTimeString());
      chart.data.datasets[0].data.push(data.concentration);
      chart.update();
    }

    setInterval(buscarDados, 5000);

  </script>

</body>
</html>
