<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Biosensor</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <div class="card">
    <h1 id="deviceName">Dispositivo</h1>
    <p class="status">Estado: <span id="estado">--</span></p>
    <p>Última medição:</p>
    <div class="valor" id="valor">--</div>
  </div>

  <div class="card">
    <div class="chart-container">
      <canvas id="grafico"></canvas>
    </div>
  </div>

  <div class="card">
    <button onclick="exportCSV()">Exportar CSV</button>
  </div>

  <div class="card">
    <button onclick="startMeasurement()">▶ Iniciar Medição</button>
    <button onclick="stopMeasurement()">⏹ Parar Medição</button>
    <button onclick="logout()">🔓 Logout</button>

    <!-- BLE BUTTON -->
    <button id="bleBtn">🔵 Ligar ao Sensor (Bluetooth)</button>
  </div>

</div>

<!-- ================= FIREBASE AUTH ================= -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB34LNKG3wHKhr6knHKLOiJdbNIjH6aQLI",
    authDomain: "biosensor-platform.firebaseapp.com",
    databaseURL: "https://biosensor-platform-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "biosensor-platform",
    storageBucket: "biosensor-platform.firebasestorage.app",
    messagingSenderId: "603962738518",
    appId: "1:603962738518:web:182bb93979a211d66938f7"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
    }
  });
</script>

<!-- ================= DASHBOARD + BLE ================= -->
<script>
const params = new URLSearchParams(window.location.search);
const deviceId = params.get("id");

document.getElementById("deviceName").innerText = deviceId || "Dispositivo";

const ctx = document.getElementById('grafico').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Concentração (mg/L)',
      data: [],
      borderWidth: 2,
      fill: false
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false
  }
});

let readings = [];

/* ================= FIREBASE FETCH ================= */
async function buscarDados() {

  const response = await fetch(
    `https://biosensor-platform-default-rtdb.europe-west1.firebasedatabase.app/devices/${deviceId}.json`
  );

  const data = await response.json();

  if (!data || !data.concentration) return;

  document.getElementById("valor").innerText = data.concentration + " mg/L";

  if (data.concentration > 10) {
    document.getElementById("estado").innerText = "🔴 ALERTA";
    document.getElementById("estado").className = "alerta";
  } else {
    document.getElementById("estado").innerText = "🟢 NORMAL";
    document.getElementById("estado").className = "normal";
  }

  chart.data.labels.push(new Date().toLocaleTimeString());
  chart.data.datasets[0].data.push(data.concentration);
  chart.update();

  readings.push({
    timestamp: Date.now(),
    concentration: data.concentration
  });
}

setInterval(buscarDados, 5000);

/* ================= CSV EXPORT ================= */
function exportCSV() {
  let csv = "timestamp,concentration\n";

  readings.forEach(r => {
    csv += `${r.timestamp},${r.concentration}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "dados_biosensor.csv";
  a.click();
}

/* ================= LOGOUT ================= */
function logout() {
  window.location.href = "login.html";
}

/* ================= FIREBASE COMMANDS ================= */
async function startMeasurement() {
  await fetch(
    `https://biosensor-platform-default-rtdb.europe-west1.firebasedatabase.app/devices/${deviceId}/command.json`,
    {
      method: "PUT",
      body: JSON.stringify("start")
    }
  );

  alert("Medição iniciada");
}

async function stopMeasurement() {
  await fetch(
    `https://biosensor-platform-default-rtdb.europe-west1.firebasedatabase.app/devices/${deviceId}/command.json`,
    {
      method: "PUT",
      body: JSON.stringify("stop")
    }
  );

  alert("Medição parada");
}

/* ================= BLE ================= */
let bleCharacteristic;

document.addEventListener("DOMContentLoaded", () => {

  document.getElementById("bleBtn").addEventListener("click", async () => {

    try {
      alert("A abrir Bluetooth...");

      const device = await navigator.bluetooth.requestDevice({
        filters: [{ services: ['12345678-1234-1234-1234-1234567890ab'] }],
        optionalServices: ['12345678-1234-1234-1234-1234567890ab']
      });

      const server = await device.gatt.connect();
      const service = await server.getPrimaryService('12345678-1234-1234-1234-1234567890ab');
      bleCharacteristic = await service.getCharacteristic('abcd1234-5678-1234-5678-1234567890ab');

      await bleCharacteristic.startNotifications();

      bleCharacteristic.addEventListener(
        'characteristicvaluechanged',
        handleBLEData
      );

      alert("Ligado ao biossensor!");

    } catch (error) {
      console.error(error);
      alert("Erro BLE: " + error);
    }
  });

});

/* ================= BLE DATA ================= */
function handleBLEData(event) {

  const value = new TextDecoder().decode(event.target.value);
  const concentracao = parseFloat(value);

  if (isNaN(concentracao)) return;

  document.getElementById("valor").innerText = concentracao + " mg/L";

  fetch(
    `https://biosensor-platform-default-rtdb.europe-west1.firebasedatabase.app/devices/${deviceId}.json`,
    {
      method: "PATCH",
      body: JSON.stringify({
        concentration: concentracao,
        timestamp: Date.now()
      })
    }
  );
}

</script>

</body>
</html>
