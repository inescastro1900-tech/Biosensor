<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Sensor de Resorufina</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <div class="card">
    <h1 id="deviceName">Sensor de Resorufina</h1>
    <p class="status">Estado: <span id="estado">Aguardando Conexão</span></p>
    <p>Última medição:</p>
    <div class="valor" id="valor">-- mg/L</div>
    
    <button id="bleBtn" style="margin-top: 20px; background-color: #3498db;">🔵 Ligar ao Sensor (Bluetooth)</button>
    
    <div class="button-group" style="margin-top: 15px; display: flex; gap: 10px;">
      <button onclick="startMeasurement()" id="btnStart" style="flex: 1; background-color: #2ecc71;">▶ Iniciar Medição</button>
      <button onclick="stopMeasurement()" id="btnStop" style="flex: 1; background-color: #e74c3c;">⏹ Parar Medição</button>
    </div>
  </div>

  <div class="card">
    <div class="chart-container" style="position: relative; height: 350px;">
      <canvas id="grafico"></canvas>
    </div>
  </div>

  <div class="card">
    <button onclick="exportCSV()" style="margin-bottom: 10px; background-color: #27ae60;">📥 Exportar CSV</button>
    <button onclick="logout()" style="background-color: #7f8c8d;">🔓 Logout</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB34LNKG3wHKhr6knHKLOiJdbNIjH6aQLI",
    authDomain: "biosensor-platform.firebaseapp.com",
    databaseURL: "https://biosensor-platform-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "biosensor-platform",
    storageBucket: "biosensor-platform.firebasestorage.app",
    messagingSenderId: "603962738518",
    appId: "1:603962738518:web:182bb93979a211d66938f7"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    if (!user) window.location.href = "login.html";
  });
</script>

<script>
let lastFirebaseUpdate = 0;
const params = new URLSearchParams(window.location.search);
const deviceId = params.get("id") || "biosensor_01";

// 1. CONFIGURAÇÃO DO GRÁFICO (Garante que o ID 'grafico' existe no HTML)
const ctx = document.getElementById('grafico').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Concentração (mg/L)',
      data: [],
      borderColor: '#1f3c88',
      borderWidth: 2,
      pointRadius: 0,
      fill: false,
      tension: 0
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    scales: {
      y: { beginAtZero: true }
    }
  }
});

let readings = [];
let bleCharacteristic;
let isMeasuring = false;
let lastFirebaseUpdate = 0;

/* ================= BLUETOOTH (BLE) ================= */
const SERVICE_UUID = '12345678-1234-1234-1234-1234567890ab';
const CHARACTERISTIC_UUID = 'abcd1234-5678-1234-5678-1234567890ab';

document.getElementById("bleBtn").addEventListener("click", async () => {
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ name: "BiosensorNano" }, { services: [SERVICE_UUID] }]
    });
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
    
    await bleCharacteristic.startNotifications();
    bleCharacteristic.addEventListener('characteristicvaluechanged', handleBLEData);

    document.getElementById("estado").innerText = "🔵 Bluetooth Conectado";
    alert("Conectado!");
  } catch (error) {
    alert("Erro Bluetooth: " + error);
  }
});

/* ================= PROCESSAMENTO DE DADOS ================= */
function handleBLEData(event) {
  if (!isMeasuring) return;

  const value = new TextDecoder().decode(event.target.value);
  const concentracao = parseFloat(value);
  if (isNaN(concentracao)) return;

  // Atualizar UI
  document.getElementById("valor").innerText = concentracao.toFixed(2) + " mg/L";
  
  // Atualizar Gráfico
  const agora = new Date().toLocaleTimeString();
  chart.data.labels.push(agora);
  chart.data.datasets[0].data.push(concentracao);

  if (chart.data.labels.length > 50) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }
  chart.update('none'); 

  // Guardar para CSV
  readings.push({ timestamp: new Date().toISOString(), concentration: concentracao });

  // Firebase (1 vez por segundo)
  const now = Date.now();
  if (now - lastFirebaseUpdate > 1000) {
    salvarNoFirebase(concentracao);
    lastFirebaseUpdate = now;
  }
}

/* ================= CONTROLOS ================= */
async function startMeasurement() {
  if (!bleCharacteristic) return alert("Conecte o Bluetooth primeiro!");
  
  // LIMPAR GRÁFICO E DADOS PARA RECOMECAR
  chart.data.labels = [];
  chart.data.datasets[0].data = [];
  chart.update();
  readings = []; 

  const encoder = new TextEncoder();
  await bleCharacteristic.writeValue(encoder.encode("1"));
  
  isMeasuring = true;
  document.getElementById("estado").innerText = "🔴 A medir...";
}

async function stopMeasurement() {
  if (!bleCharacteristic) return;
  const encoder = new TextEncoder();
  await bleCharacteristic.writeValue(encoder.encode("0"));
  
  isMeasuring = false;
  document.getElementById("estado").innerText = "⏹ Parado";
}

async function salvarNoFirebase(valor) {
  fetch(`https://biosensor-platform-default-rtdb.europe-west1.firebasedatabase.app/devices/${deviceId}.json`, {
    method: "PATCH",
    body: JSON.stringify({ concentration: valor, timestamp: Date.now() })
  });
}

function exportCSV() {
  if (readings.length === 0) return alert("Não há dados para exportar.");
  let csv = "timestamp,concentration_mgL\n";
  readings.forEach(r => csv += `${r.timestamp},${r.concentration}\n`);
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "dados_resorufina.csv";
  a.click();
}

function logout() { window.location.href = "login.html"; }
</script>
</body>
</html>
